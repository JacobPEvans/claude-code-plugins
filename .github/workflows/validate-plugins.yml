name: Validate Plugins

on:
  pull_request:
    paths:
      - '*/.claude-plugin/**'
      - '.claude-plugin/**'

permissions:
  contents: read

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin structure
        run: bash scripts/validate-plugin-structure.sh

      - name: Validate marketplace consistency
        run: bash scripts/validate-marketplace.sh
